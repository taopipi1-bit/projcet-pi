  openModal(`
    <h2 style="display:flex;align-items:center;gap:var(--s-2)">云同步</h2>
    <p class="lede" style="margin-top:var(--s-2)">用 GitHub Gist 当后端，跨设备同步你的数据。</p>

    <div style="margin-top:var(--s-4);display:flex;align-items:center;gap:var(--s-2);flex-wrap:wrap">
      <span class="sync-status" id="syncStatus" data-state="${stat.status}">
        <span class="dot"></span>
        <span id="syncStatusText">${escapeHtml(statusText)}${statusReason}</span>
      </span>
      <span class="sync-meta">最近同步: ${escapeHtml(lastAt)}</span>
    </div>

    <div class="sync-row">
      <label for="syncPat">GitHub Personal Access Token (PAT)</label>
      <div class="sync-input-wrap">
        <input id="syncPat" class="field" type="password" autocomplete="off" spellcheck="false"
               placeholder="ghp_xxxx... (需要 gist scope)" value="${escapeAttr(cfg.pat)}" />
        <button type="button" class="eye" id="syncPatEye" aria-label="切换可见"></button>
      </div>
    </div>

    <div class="sync-row">
      <label for="syncGistId">Gist ID (留空则首次保存时自动创建私密 Gist)</label>
      <input id="syncGistId" class="field" type="text" autocomplete="off" spellcheck="false"
             placeholder="例如: a1b2c3d4..." value="${escapeAttr(cfg.gistId)}" />
    </div>

    <div class="sync-actions">
      <button type="button" class="btn" id="syncSave">保存设置</button>
      <button type="button" class="btn btn-ghost" id="syncNow">立即同步</button>
      <button type="button" class="btn btn-ghost btn-block-full" id="syncDisconnect">断开</button>
    </div>

    <details class="sync-help">
      <summary>如何获取 PAT? (展开)</summary>
      <ol>
        <li>打开 <code>https://github.com/settings/tokens</code></li>
        <li>选 <b>Generate new token (classic)</b></li>
        <li>勾选 <code>gist</code> scope (只勾这一个就够)</li>
        <li>过期时间按需选 (推荐 90 天或 No expiration)</li>
        <li>复制 <code>ghp_...</code> 开头的 token, 粘贴到上面</li>
      </ol>
      <div>Gist 默认是 <b>私密</b> (Secret), 不会被搜索引擎索引, 但有链接的人可以访问。同步文件名固定为 <code>life-of-pi.json</code>。</div>
      <p class="warn">⚠ PAT 明文存浏览器 localStorage; 不要在公共/借用设备上输入; 不再使用时点"断开"或在 GitHub 后台撤销该 token。</p>
    </details>

    <div class="sync-section-title">数据维护</div>
    <div class="sync-actions">
      <button type="button" class="btn btn-danger" id="syncEraseLocal">擦除本地</button>
      <button type="button" class="btn btn-danger" id="syncEraseCloud">擦除云端</button>
    </div>
    <p class="sync-meta">"擦除本地"只清这台设备的 lop:* 数据 (不动云端 Gist); "擦除云端"只清 Gist 内容 (不动本地)。</p>
  `);

  /* === 行为绑定 === */
  const $ = id => document.getElementById(id);

  // PAT 显隐切换
  let patVisible = false;
  const renderEye = () => { $('syncPatEye').innerHTML = patVisible ? icons.eyeOff() : icons.eye(); };
  renderEye();
  $('syncPatEye').onclick = () => {
    patVisible = !patVisible;
    $('syncPat').type = patVisible ? 'text' : 'password';
    renderEye();
  };

  // 状态实时更新 (modal 关闭后自剪枝)
  let off = null;
  const refreshStatus = () => {
    const elBadge = $('syncStatus');
    const elText  = $('syncStatusText');
    if (!elBadge || !elText) {  // modal 已关闭, 注销
      if (off) { off(); off = null; }
      return;
    }
    const s = cloudSync.getStatus();
    const lbl = statusLabels[s.status] || s.status;
    const reason = s.reason ? ' · ' + s.reason : '';
    elBadge.dataset.state = s.status;
    elText.textContent = lbl + reason;
  };
  off = cloudSync.onStatusChange(refreshStatus);

  // 保存设置
  $('syncSave').onclick = () => {
    const pat = $('syncPat').value.trim();
    const gistId = $('syncGistId').value.trim();
    cloudSync.setConfig({ pat, gistId });
    showToast(pat ? '设置已保存' : '已清空 PAT');
    refreshStatus();
  };

  // 立即同步
  $('syncNow').onclick = async () => {
    const wasEmpty = !$('syncGistId').value.trim();
    $('syncNow').disabled = true;
    try {
      const r = await cloudSync.syncNow();
      // 首次推送时若 Gist 是自动创建的, 回填 ID 到输入框 (方便长按复制)
      const newGistId = cloudSync.getConfig().gistId;
      if (wasEmpty && newGistId) {
        $('syncGistId').value = newGistId;
        $('syncGistId').focus();
        try { $('syncGistId').select(); } catch (_) {}
        showToast('✓ 已创建私密 Gist (ID 已填入, 复制到其他设备使用)');
      } else {
        showToast(r.pulled ? '✓ 已从云端拉取' : '✓ 已推送到云端');
      }
    } catch (e) {
      showToast('同步失败: ' + (e.message || e));
    } finally {
      $('syncNow').disabled = false;
      refreshStatus();
    }
  };

  // 断开
  $('syncDisconnect').onclick = () => {
    if (!confirm('断开后将清除本地保存的 PAT (Gist ID 保留以便重连)。继续?')) return;
    cloudSync.disconnect();
    $('syncPat').value = '';
    refreshStatus();
    showToast('已断开');
  };

  // 擦除本地
  $('syncEraseLocal').onclick = () => {
    if (!confirm('确定要擦除本机所有 Life of Pi 数据? (不影响云端 Gist)\n\n此操作不可撤销。')) return;
    cloudSync.eraseLocalData();
    showToast('本地已擦除, 即将刷新');
    setTimeout(() => location.reload(), 800);
  };

  // 擦除云端
  $('syncEraseCloud').onclick = async () => {
    if (!confirm('确定要清空云端 Gist? (不影响本机)\n\n此操作不可撤销。')) return;
    try {
      await cloudSync.eraseCloudData();
      showToast('✓ 云端已清空');
    } catch (e) {
      showToast('清空失败: ' + (e.message || e));
    }
    refreshStatus();
  };
}

/* 简易 HTML/属性转义,防止把用户输入作为 HTML 注入 */
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) {
  return escapeHtml(s).replace(/"/g, '&quot;');
}

/* ===== 10. Bootstrap ===== */
async function bootstrap() {
  migrate();

  // PWA standalone 检测：从主屏图标启动时给 body 加标记，CSS 可据此区分
  // （iOS 用 navigator.standalone，其他 UA 用 display-mode media query）
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
  if (isStandalone) document.body.classList.add('is-standalone');

  // URL 参数：开发/截图用（?demo=1 强制 onboarded+seed，?theme=light|dark 强制主题）
  const params = new URLSearchParams(location.search);
  const forceTheme = params.get('theme');
  const demoMode   = params.has('demo');

  // 初始化图标（FAB / 时光机 / 齿轮 = 云同步入口）
  document.getElementById('fab').innerHTML = icons.plus();
  document.querySelectorAll('[data-action="timeMachine"]').forEach(el => el.innerHTML = icons.timeM());
  document.querySelectorAll('[data-action="openSyncSettings"]').forEach(el => el.innerHTML = icons.gear());

  // 主题（urlOverride > saved > 默认 light）
  const settings = db.settings.get();
  const theme = forceTheme || settings.theme || 'light';
  applyTheme(theme);

  // 启动时若已配置云同步, 先 pull (云端较新则覆盖本地), 再渲染。
  // 失败不阻塞 UI: cloudSync 内部已捕获并设置 status='error'。
  await cloudSync.bootPull();

  renderTabbar();

  // demo / onboarded
  if (demoMode) {
    db.settings.set({ onboarded: true, name: settings.name || '小宇' });
    seedExamples();
    document.getElementById('splash').classList.add('hidden');
    switchTab('countdown');
  } else if (db.settings.get().onboarded) {
    document.getElementById('splash').classList.add('hidden');
    switchTab(currentTab);
  }
  // 否则：splash 默认显示

  // 截图/调试用：?view=detail | wizard | report | reviews | newReview |
  //              timeMachine | ceremony | stats | newHabit | flash
  const view = params.get('view');
  if (view === 'detail') {
    const first = db.countdowns.list()[0];
    if (first) setTimeout(() => enterCountdownDetail(first.id), 0);
  } else if (view === 'wizard') {
    setTimeout(() => openNewCountdown(), 0);
  } else if (view === 'report') {
    const t = params.get('type') || 'week';
    const items = db.reviews.list().filter(r => r.type === t).sort((a,b) => b.createdAt - a.createdAt);
    if (items[0]) setTimeout(() => enterReviewReport(items[0].id), 0);
  } else if (view === 'reviews') {
    setTimeout(() => switchTab('review'), 0);
  } else if (view === 'newReview') {
    setTimeout(() => openNewReview(params.get('type') || 'week'), 0);
  } else if (view === 'timeMachine') {
    setTimeout(() => openTimeMachine(), 0);
  } else if (view === 'ceremony') {
    const first = db.countdowns.list()[0];
    if (first) setTimeout(() => openCeremony(first.id), 0);
  } else if (view === 'stats') {
    _checkinMode = 'stats';
    setTimeout(() => switchTab('checkin'), 0);
  } else if (view === 'newHabit') {
    setTimeout(() => openNewHabit(), 0);
  } else if (view === 'flash') {
    // 用一个未来日期强制闪现（绕过 lastPromiseFlash 节流）
    db.settings.set({ lastPromiseFlash: '' });
    setTimeout(() => flashPromiseIfNeeded(), 100);
  }

  // 启动后副作用：每天首次承诺闪现 + 周日复盘提醒（view 调试模式不触发）
  if (!view) {
    flashPromiseIfNeeded();
    maybeShowSundayBar();
  }

  /* === 全局事件代理 === */
  document.addEventListener('click', e => {
    const t = e.target.closest('[data-action]');
    if (!t) return;
    const a = t.dataset.action;
    if (a === 'toggleTheme') toggleTheme();
    else if (a === 'openSyncSettings') openSyncSettings();
    else if (a === 'closeModal') closeModal();
    else if (a === 'timeMachine') openTimeMachine();
    else if (a === 'closeTimeMachine') closeTimeMachine();
    else if (a === 'echo') recordEcho(t.dataset.r);
    else if (a === 'exitDetail') exitCountdownDetail();
    else if (a === 'completeCountdown') completeCountdown();
    else if (a === 'closeCeremony') closeCeremony();
    else if (a === 'confirmComplete') confirmComplete();
    else if (a === 'newReview') openNewReview(t.dataset.type);
    else if (a === 'openReport') enterReviewReport(t.dataset.id);
    else if (a === 'closeReport') exitReviewReport();
    else if (a === 'exportReport') exportReport();
    else if (a === 'startWeekReview') {
      dismissSundayBar();
      openNewReview('week');
    }
    else if (a === 'dismissSunday') dismissSundayBar();
  });

  document.getElementById('fab').addEventListener('click', handleFab);

  // ESC 关 Modal / 时光机 / 仪式
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('ceremony').classList.contains('active')) {
      closeCeremony();
    } else if (document.getElementById('timeMachine').classList.contains('active')) {
      closeTimeMachine();
    } else {
      closeModal();
    }
  });

  // 点击 modal 背景关闭
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target.id === 'modal') closeModal();
  });

  // Splash 进入
  document.getElementById('splashForm').addEventListener('submit', e => {
    e.preventDefault();
    const name = document.getElementById('splashName').value.trim() || 'You';
    const isFirst = !db.settings.get().onboarded;
    db.settings.set({ onboarded: true, name });
    document.getElementById('splash').classList.add('hidden');
    if (isFirst) seedExamples();
    switchTab('countdown');
  });
}

      type: 'week',
